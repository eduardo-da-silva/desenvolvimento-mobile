site_name: Desenvolvimento para Dispositivos Móveis
site_author: Eduardo da Silva
site_description: Curso de desenvolvimento mobile com Vue.js 3, PWA e tecnologias web modernas
site_url: https://eduardo-da-silva.github.io/desenvolvimento-mobile
repo_url: https://github.com/eduardo-da-silva/desenvolvimento-mobile
repo_name: eduardo-da-silva/desenvolvimento-mobile
copyright: Copyright &copy; 2026 Eduardo da Silva

plugins:
  - search:
      lang: 
        - pt
        - en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
          remove_comments: true
      cache_safe: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eduardo-da-silva
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/eduardo-da-silva
      name: LinkedIn
  generator: false
  
  # Tags para adicionar metadados
  tags:
    Mobile: mobile
    PWA: pwa
    Vue.js: vuejs
    JavaScript: javascript
  
  # Versão do curso
  version:
    provider: mike
    default: latest
  
  # Analytics (descomente se quiser adicionar)
  # analytics:
  #   provider: google
  #   property: G-XXXXXXXXXX

theme:
  name: material
  favicon: images/favicon.svg
  logo: images/logo.svg
  language: pt-BR
  features:
    - announce.dismiss
    - content.action.edit
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette: 
    # Modo claro (tema moderno com roxo/azul)
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7 
        name: Mudar para modo escuro
    # Modo escuro
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: squidfunk
      repo: mkdocs-material
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - assets/css/extra.css

extra_javascript:
  - https://unpkg.com/tablesort@5.3.0/dist/tablesort.min.js
  - assets/js/tablesort.js

nav:
